language: cpp
jobs:
  include:
    - name: Linux GCC 7
      os: linux
      dist: bionic
      compiler: gcc

    - name: Linux GCC 10
      os: linux
      dist: focal
      compiler: gcc
      env:
        - CC=gcc-10
        - CXX=g++-10
      addons:
        apt:
          sources:
            - ubuntu-tootchain-r-test
          packages:
            - gcc-10
            - g++-10

    - name: Linux Clang 7
      os: linux
      dist: bionic
      compiler: clang
      addons:
        apt:
          packages:
            - libc++-dev
            - libc++abi-dev

    - name: Linux Clang 10
      os: linux
      dist: focal
      compiler: clang
      env:
        - CC=clang-10
        - CXX=clang++-10
      addons:
        apt:
          packages:
            - clang-10
            - libc++-dev
            - libc++abi-dev

    - name: OSX GCC 7
      os: osx
      osx_image: xcode12.2
      env:
        - HOMEBREW_NO_INSTALL_CLEANUP=1
        - CC=gcc-7
        - CXX=g++-7
      addons:
        homebrew:
          packages:
            - gcc@7

    - name: OSX GCC 10
      os: osx
      osx_image: xcode12.2
      env:
        - HOMEBREW_NO_INSTALL_CLEANUP=1
        - CC=gcc-10
        - CXX=g++-10
      addons:
        homebrew:
          packages:
            - gcc

    - name: OSX Clang 9
      os: osx
      osx_image: xcode9.4
      compiler: clang

    - name: OSX Clang 12
      os: osx
      osx_image: xcode12.2
      compiler: clang

script: make -j check_run check_run_release

notifications:
  email: false
